name: Build and Publish Docker Image

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Python syntax
        run: python3 -m py_compile polyfield-log-filter.py

      - name: Validate Bash scripts
        run: |
          bash -n entrypoint.sh
          bash -n validate_config.sh

      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true

      - name: Check for required files
        run: |
          test -f entrypoint.sh || (echo "entrypoint.sh not found" && exit 1)
          test -f validate_config.sh || (echo "validate_config.sh not found" && exit 1)
          test -f polyfield-log-filter.py || (echo "polyfield-log-filter.py not found" && exit 1)
          test -f Dockerfile || (echo "Dockerfile not found" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: GHCR.io Login Successful
        run: echo "Successfully logged in to GitHub Container Registry."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Hub Login Successful
        run: echo "Successfully logged in to Docker Hub."

      - name: Extract Docker Metadata for GHCR.io and Docker Hub
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/jorgeluisreis/polyfield-server
            jluisreis/polyfield-server
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=beta,enable=${{ github.event.release.target_commitish == 'development' }}
            type=raw,value=latest,enable=${{ github.event.release.target_commitish != 'development' }}
      - name: Docker Metadata Extracted
        run: echo "Extracted Docker metadata for both registries."

      - name: Build and Push Image to GHCR.io and Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Image Build and Push Complete
        run: echo "Image successfully built and pushed to GHCR.io and Docker Hub."

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: jluisreis/polyfield-server
          readme-filepath: ./README.md